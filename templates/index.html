<!DOCTYPE html>
<html>
<head>
    <title>GetTheText</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0f;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        #space {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(60, 0, 120, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 40, 100, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 10, 30, 0.4) 0%, transparent 80%);
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 2.2rem;
            letter-spacing: 6px;
            margin-bottom: 6px;
            color: #ffffff;
            text-shadow:
                0 0 10px #00ff41,
                0 0 30px #00ff4177,
                0 0 60px #00ff4133;
        }

        .subtitle {
            font-size: 0.75rem;
            color: #4a9eff88;
            letter-spacing: 3px;
            margin-bottom: 50px;
        }

        .card {
            width: 100%;
            max-width: 640px;
            background: rgba(10, 10, 20, 0.75);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 12px;
            padding: 36px;
            backdrop-filter: blur(12px);
            box-shadow:
                0 0 40px rgba(0, 255, 65, 0.05),
                0 20px 60px rgba(0, 0, 0, 0.6);
            margin-bottom: 24px;
        }

        .upload-area {
            width: 100%;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            padding: 55px 20px;
            text-align: center;
            background: rgba(0, 255, 65, 0.03);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
        }

        .upload-area:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon {
            font-size: 2.8rem;
            margin-bottom: 14px;
        }

        .upload-label {
            font-size: 0.85rem;
            color: #00ff41;
            letter-spacing: 2px;
        }

        .upload-hint {
            font-size: 0.7rem;
            color: rgba(0, 255, 65, 0.4);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        #file-name {
            margin-top: 12px;
            font-size: 0.75rem;
            color: #4a9eff;
            letter-spacing: 1px;
            min-height: 16px;
        }

        #preview {
            display: none;
            margin-top: 16px;
            max-width: 100%;
            max-height: 220px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            object-fit: contain;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(0,255,65,0.15), rgba(74,158,255,0.1));
            border: 1px solid rgba(0, 255, 65, 0.5);
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        button[type="submit"]:hover {
            background: linear-gradient(135deg, rgba(0,255,65,0.3), rgba(74,158,255,0.2));
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.3);
            color: #ffffff;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box {
            width: 100%;
            max-width: 640px;
            animation: fadeInUp 0.6s ease forwards;
        }

        .result-header {
            font-size: 0.72rem;
            letter-spacing: 3px;
            color: rgba(74, 158, 255, 0.7);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 8px;
            padding: 22px;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.95rem;
            line-height: 1.8;
            color: #e0ffe8;
            margin-bottom: 14px;
            min-height: 80px;
            backdrop-filter: blur(8px);
        }

        #copybtn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(74, 158, 255, 0.4);
            color: #4a9eff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        #copybtn:hover {
            background: rgba(74, 158, 255, 0.1);
            border-color: #4a9eff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.2);
        }

        .scanline {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,0,0,0.04) 3px,
                rgba(0,0,0,0.04) 4px
            );
            z-index: 999;
        }
    </style>
</head>
<body>
    <canvas id="space"></canvas>
    <div class="scanline"></div>

    <div class="content">
        <h2>GetTheText</h2>
        <div class="subtitle">Extract Text From Any Image</div>

        <div class="card">
            <form action="/extract" method="POST" enctype="multipart/form-data">
                <div class="upload-area">
                    <input type="file" name="image" accept="image/*" required
                        onchange="
                            document.getElementById('file-name').innerText = '> ' + this.files[0].name;
                            const reader = new FileReader();
                            reader.onload = e => {
                                const preview = document.getElementById('preview');
                                preview.src = e.target.result;
                                preview.style.display = 'block';
                            };
                            reader.readAsDataURL(this.files[0]);
                        ">
                    <div class="upload-icon">🌌</div>
                    <div class="upload-label">DROP IMAGE OR CLICK TO BROWSE</div>
                    <div class="upload-hint">Supports JPG, PNG, WEBP</div>
                    <div id="file-name"></div>
                    <img id="preview" src="" alt="preview">
                </div>
                <button type="submit">Run Extraction</button>
            </form>
        </div>

        {% if result %}
        <div class="result-box">
            <div class="result-header">OUTPUT</div>
            <pre id="output">{{ result }}</pre>
            <button id="copybtn" onclick="copyText()">Copy Output</button>
        </div>

        <script>
            function copyText() {
                const text = document.getElementById("output").innerText;
                navigator.clipboard.writeText(text).then(function() {
                    document.getElementById("copybtn").innerText = "Copied!";
                    setTimeout(() => {
                        document.getElementById("copybtn").innerText = "Copy Output";
                    }, 2000);
                });
            }
        </script>
        {% endif %}
    </div>

    <script>
        const canvas = document.getElementById('space');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = Array.from({length: 180}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.2,
            alpha: Math.random(),
            speed: Math.random() * 0.005 + 0.002
        }));

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        drawStars();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
